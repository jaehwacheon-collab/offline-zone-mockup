  <style>
    .legend { display: flex; align-items: center; gap: 16px; padding: 10px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
    .legend-dot { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #e0e0e0; }
    .calendar-wrap { overflow: auto; padding: 16px 24px 40px; }
    table { border-collapse: collapse; min-width: max-content; }
    .zone-col { position: sticky; left: 0; background: #fff; z-index: 10; min-width: 210px; max-width: 210px; }
    thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 5; border: 1px solid #e0e0e0; padding: 6px 4px; text-align: center; font-weight: 600; color: #555; font-size: 11px; white-space: nowrap; }
    thead th.zone-col { z-index: 15; left: 0; text-align: left; padding-left: 12px; font-size: 12px; color: #333; }
    .week-current { background: #e8f0fe !important; color: #1a73e8 !important; }
    tbody tr:hover td { background: #fafafa; }
    tbody td { border: 1px solid #e8e8e8; height: 36px; min-width: 26px; max-width: 26px; padding: 0; text-align: center; vertical-align: middle; cursor: pointer; }
    tbody td.zone-col { min-width: 210px; max-width: 210px; padding: 0 12px; text-align: left; cursor: default; background: #fff; }
    tbody td.zone-col:hover { background: #fff !important; }
    .group-row td { background: #f0f4ff; font-weight: 700; font-size: 11px; color: #1a73e8; padding: 5px 12px; border: 1px solid #e0e0e0; cursor: default; }
    .group-row td:hover { background: #f0f4ff !important; }
    .zone-name { font-size: 12px; font-weight: 500; color: #333; display: flex; align-items: center; gap: 4px; }
    .cell-empty { background: #fff; }
    .cell-empty:hover { background: #e8f0fe; }
    .cell-applied { background: #fff9c4; }
    .cell-prebooked { background: #ffe0b2; }
    .cell-confirmed { background: #c8e6c9; }
    .cell-completed { background: #e0e0e0; }
    .cell-bar { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: rgba(0,0,0,0.35); position: relative; }
    .cell-count { position: absolute; top: 1px; right: 2px; background: #e65100; color: #fff; font-size: 8px; font-weight: 800; border-radius: 50%; width: 13px; height: 13px; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .usage-col { position: sticky; right: 0; background: #fff; z-index: 10; min-width: 80px; max-width: 80px; padding: 0 10px; border-left: 2px solid #e0e0e0 !important; cursor: default; }
    .usage-col:hover { background: #fff !important; }
    thead th.usage-col { background: #f8f9fa; z-index: 15; text-align: center; }
    .usage-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .usage-pct { font-size: 11px; font-weight: 700; }
    .usage-bar-bg { width: 52px; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
    .usage-bar-fill { height: 100%; border-radius: 3px; }
  </style>
</head>

const bookings=[

  {zoneId:1,startWeek:20,endWeek:22,status:'APPLIED',brand:'뉴발란스',applicant:'황태일',project:'뉴발란스 204 발매'},
  {zoneId:2,startWeek:14,endWeek:15,status:'PRE_BOOKED',brand:'엔하이픈',applicant:'임재훈',project:'엔하이픈 앨범 발매'},
  {zoneId:2,startWeek:18,endWeek:20,status:'APPLIED',brand:'챔피온',applicant:'임주리',project:'챔피온 x 언더커버'},
  {zoneId:3,startWeek:10,endWeek:13,status:'COMPLETED',brand:'나이키',applicant:'김강희',project:'나이키 캠페인'},
  {zoneId:3,startWeek:15,endWeek:18,status:'CONFIRMED',brand:'아디다스',applicant:'박상혁',project:'아디다스 DID'},
  {zoneId:5,startWeek:16,endWeek:19,status:'CONFIRMED',brand:'로제',applicant:'최진영',project:'블랙핑크 로제 팝업'},
  {zoneId:7,startWeek:12,endWeek:16,status:'COMPLETED',brand:'엄브로',applicant:'곽민영',project:'엄브로 외벽 광고'},
  {zoneId:7,startWeek:18,endWeek:22,status:'PRE_BOOKED',brand:'나이키',applicant:'유대곤',project:'나이키 외벽'},
  {zoneId:10,startWeek:14,endWeek:20,status:'CONFIRMED',brand:'무신사',applicant:'광고사업팀',project:'무신사 브랜드 캠페인'},
  {zoneId:11,startWeek:18,endWeek:24,status:'APPLIED',brand:'나이키',applicant:'광고사업팀',project:'나이키 빌보드'},
  // 복수 가부킹 케이스 — 성수점 팝업존 B, 25~27주, 3건 경합 중
  {zoneId:6,startWeek:25,endWeek:27,status:'PRE_BOOKED',brand:'아디다스',applicant:'이수현',project:'아디다스 오리지널스 팝업'},
  {zoneId:6,startWeek:25,endWeek:26,status:'PRE_BOOKED',brand:'뉴발란스',applicant:'황태일',project:'뉴발란스 여름 캠페인'},
  {zoneId:6,startWeek:26,endWeek:27,status:'PRE_BOOKED',brand:'컨버스',applicant:'임주리',project:'컨버스 척테일러 팝업'},

const zoneInfo={
  1:{photo:'https://images.unsplash.com/photo-1555529669-2269763671c0?w=400&q=80',location:'1F 입구 우측',size:'W 6m × D 4m × H 3m',floor:'1F',manager:'박세연',note:'전기 콘센트 4구 제공, 천장 조명 조절 가능'},
  2:{photo:'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=400&q=80',location:'1F 입구 좌측',size:'W 5m × D 3m × H 3m',floor:'1F',manager:'박세연',note:'기둥 없는 독립 공간'},
  3:{photo:'https://images.unsplash.com/photo-1567967455389-e432b5a31a4e?w=400&q=80',location:'2F 에스컬레이터 옆',size:'55인치 × 4대',floor:'2F',manager:'이세영',note:'해상도 2160×3840px, SK쉴더스 원격 송출'},
  4:{photo:'https://images.unsplash.com/photo-1580974852861-24e4b1c97c9b?w=400&q=80',location:'1F 메인 벽면',size:'W 4m × H 2.5m (LED)',floor:'1F',manager:'이세영',note:'매장 내 가장 높은 노출 위치'},
  5:{photo:'https://images.unsplash.com/photo-1555529669-2269763671c0?w=400&q=80',location:'1F 중앙',size:'W 8m × D 5m × H 3.5m',floor:'1F',manager:'최진영',note:'전기 6구, 수도 연결 가능'},
  6:{photo:'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=400&q=80',location:'2F 테라스 연결부',size:'W 6m × D 4m × H 3m',floor:'2F',manager:'최진영',note:'자연채광 가능, 외부 노출 반오픈형'},
  7:{photo:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&q=80',location:'건물 남측 외벽',size:'W 12m × H 8m',floor:'외부',manager:'곽민영',note:'시공사: 타라 / 철거·복원 일정 협의 필요'},
  8:{photo:'https://images.unsplash.com/photo-1567967455389-e432b5a31a4e?w=400&q=80',location:'1F 매장 입구',size:'55인치 × 2대',floor:'1F',manager:'이세영',note:'해상도 2160×3840px'},
  9:{photo:'https://images.unsplash.com/photo-1555529669-2269763671c0?w=400&q=80',location:'B1F 메인홀',size:'W 10m × D 6m × H 4m',floor:'B1F',manager:'정유진',note:'지하 위치, 엘리베이터 반입 가능'},
  10:{photo:'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&q=80',location:'강남대로 사거리',size:'W 14m × H 6m',floor:'옥외',manager:'광고사업팀',note:'대행사: 애드빅컴 / 월 400만원'},
  11:{photo:'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&q=80',location:'홍대입구역 9번 출구',size:'W 10m × H 5m',floor:'옥외',manager:'광고사업팀',note:'대행사: 인컴이즈 / 월 300만원'},
};
const tCls={팝업:'type-popup',DID:'type-did',미디어월:'type-mediawall',빌보드:'type-billboard',외벽:'type-exterior'};
const sCls={APPLIED:'cell-applied',PRE_BOOKED:'cell-prebooked',CONFIRMED:'cell-confirmed',COMPLETED:'cell-completed'};
const sLbl={APPLIED:'A',PRE_BOOKED:'P',CONFIRMED:'C',COMPLETED:'✓'};
const bCls={APPLIED:'badge-applied',PRE_BOOKED:'badge-prebooked',CONFIRMED:'badge-confirmed',COMPLETED:'badge-completed'};
function getBk(zid,w){return bookings.find(b=>b.zoneId===zid&&w>=b.startWeek&&w<=b.endWeek&&!['PRE_BOOKED_MULTI'].includes(b._skip))||null;}
function getBks(zid,w){return bookings.filter(b=>b.zoneId===zid&&w>=b.startWeek&&w<=b.endWeek);}
function buildCalendar(){
  const table=document.getElementById('calTable');
  const groups={};
  zones.forEach(z=>{if(!groups[z.venue])groups[z.venue]=[];groups[z.venue].push(z);});
  let thead='<thead><tr><th class="zone-col">구좌</th>';
  for(let w=1;w<=WEEKS;w++)thead+=`<th class="${w===CW?'week-current':''}">${w}</th>`;
  thead+='<th class="usage-col">사용률</th></tr></thead>';
  table.innerHTML=thead;
  const tbody=document.createElement('tbody');
  Object.entries(groups).forEach(([venue,vz])=>{
    const gr=document.createElement('tr');gr.className='group-row';
    const gtd=document.createElement('td');gtd.colSpan=WEEKS+1;gtd.textContent=venue;
    gr.appendChild(gtd);tbody.appendChild(gr);
    vz.forEach(zone=>{
      const tr=document.createElement('tr');
      const ntd=document.createElement('td');ntd.className='zone-col';
      ntd.innerHTML=`<div class="zone-name">${zone.name}<span class="type-badge ${tCls[zone.type]}">${zone.type}</span></div>`;
      tr.appendChild(ntd);
      for(let w=1;w<=WEEKS;w++){
        const td=document.createElement('td');
        const bks=getBks(zone.id,w);
        if(bks.length>1){
          // 복수 가부킹: 주황 배경 + 건수 뱃지
          td.className='cell-prebooked';
          td.innerHTML=`<div class="cell-bar">P<span class="cell-count">${bks.length}</span></div>`;
          td.onclick=()=>openMultiPanel(zone,w,bks);
        } else if(bks.length===1){
          const bk=bks[0];
          td.className=sCls[bk.status]||'';
          td.innerHTML=`<div class="cell-bar">${sLbl[bk.status]||''}</div>`;
          td.onclick=()=>openDetailPanel(zone,bk);
        } else {
          td.className='cell-empty';td.onclick=()=>openApplyPanel(zone,w);
        }
        tr.appendChild(td);
      }
      // 사용률 계산: CONFIRMED + COMPLETED + PRE_BOOKED + APPLIED 중 점유된 주 수
      let usedWeeks=0;
      for(let w=1;w<=WEEKS;w++){if(getBks(zone.id,w).length>0)usedWeeks++;}
      const pct=Math.round(usedWeeks/WEEKS*100);
      const color=pct>=60?'#43a047':pct>=30?'#1a73e8':'#bdbdbd';
      const utd=document.createElement('td');
      utd.className='usage-col';
      utd.innerHTML=`<div class="usage-bar-wrap"><span class="usage-pct" style="color:${color};">${pct}%</span><div class="usage-bar-bg"><div class="usage-bar-fill" style="width:${pct}%;background:${color};"></div></div></div>`;
      tr.appendChild(utd);
      tbody.appendChild(tr);
    });
  });
  table.appendChild(tbody);
}
function openDetailPanel(zone,bk){
  document.getElementById('panelTitle').textContent=bk.project;
  document.getElementById('panelSub').textContent=zone.name;
  document.getElementById('panelBody').innerHTML=`
    <div class="panel-row"><div class="panel-key">상태</div><div class="panel-val"><span class="badge ${bCls[bk.status]}">${bk.status}</span></div></div>
    <div class="panel-row"><div class="panel-key">구좌</div><div class="panel-val">${zone.name} <span class="type-badge ${tCls[zone.type]}">${zone.type}</span></div></div>
    <div class="panel-row"><div class="panel-key">브랜드</div><div class="panel-val">${bk.brand}</div></div>
    <div class="panel-row"><div class="panel-key">신청자</div><div class="panel-val">${bk.applicant}</div></div>
    <div class="panel-row"><div class="panel-key">신청 기간</div><div class="panel-val">${bk.startWeek}주 ~ ${bk.endWeek}주</div></div>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;">
      <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:12px;">상태 변경 이력</div>
      <ul class="timeline">
        <li class="timeline-item"><div class="timeline-dot" style="background:#fff9c4;color:#856404;font-size:10px;font-weight:700;">A</div><div class="timeline-content"><div class="timeline-date">2026-04-10 09:12</div><div class="timeline-text">APPLIED</div><div class="timeline-sub">${bk.applicant} 신청</div></div></li>
        ${bk.status!=='APPLIED'?`<li class="timeline-item"><div class="timeline-dot" style="background:#ffe0b2;color:#7f4400;font-size:10px;font-weight:700;">P</div><div class="timeline-content"><div class="timeline-date">2026-04-11 14:30</div><div class="timeline-text">PRE_BOOKED</div><div class="timeline-sub">스토어 담당자 1차 승인</div></div></li>`:''}
        ${bk.status==='CONFIRMED'||bk.status==='COMPLETED'?`<li class="timeline-item"><div class="timeline-dot" style="background:#c8e6c9;color:#1b5e20;font-size:10px;font-weight:700;">C</div><div class="timeline-content"><div class="timeline-date">2026-04-12 10:00</div><div class="timeline-text">CONFIRMED</div><div class="timeline-sub">스토어 담당자 최종 확정</div></div></li>`:''}
        ${bk.status==='COMPLETED'?`<li class="timeline-item"><div class="timeline-dot" style="background:#e0e0e0;color:#555;font-size:10px;">✓</div><div class="timeline-content"><div class="timeline-date">2026-04-14 00:00</div><div class="timeline-text">COMPLETED</div><div class="timeline-sub">시스템 자동 전환</div></div></li>`:''}
      </ul>
    </div>
    <div style="margin-top:8px;"><a href="booking-detail.html" style="font-size:12px;color:#1a73e8;">상세 페이지에서 보기 →</a></div>`;
  const ac=document.getElementById('panelActions');
  if(bk.status==='APPLIED')ac.innerHTML=`<button class="btn-primary" style="flex:1;">1차 승인</button><button class="btn-danger" style="flex:1;">반려</button>`;
  else if(bk.status==='PRE_BOOKED')ac.innerHTML=`<button class="btn-primary" style="flex:1;">최종 확정</button><button class="btn-danger" style="flex:1;">반려</button>`;
  else ac.innerHTML='';
  openPanel();
}
function openMultiPanel(zone,week,bks){
  document.getElementById('panelTitle').textContent=`가부킹 ${bks.length}건 — 경합 중`;
  document.getElementById('panelSub').textContent=`${zone.name} · ${week}주차`;
  const rows=bks.map((bk,i)=>`
    <div style="border:1px solid #ffe0b2;border-radius:6px;padding:14px 14px 10px;margin-bottom:12px;background:#fffaf6;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:700;color:#111;">${bk.brand}</span>
        <span class="badge badge-prebooked">PRE_BOOKED</span>
      </div>
      <div class="panel-row" style="margin-bottom:6px;"><div class="panel-key">프로젝트</div><div class="panel-val">${bk.project}</div></div>
      <div class="panel-row" style="margin-bottom:6px;"><div class="panel-key">신청자</div><div class="panel-val">${bk.applicant}</div></div>
      <div class="panel-row" style="margin-bottom:10px;"><div class="panel-key">신청 기간</div><div class="panel-val">${bk.startWeek}주 ~ ${bk.endWeek}주</div></div>
      <div style="display:flex;gap:6px;">
        <button class="btn-primary" style="flex:1;font-size:12px;padding:5px 0;" onclick="alert('${bk.brand} 건을 최종 확정합니다. 나머지 ${bks.length-1}건은 자동 반려됩니다.')">확정</button>
        <button class="btn-danger" style="flex:1;font-size:12px;padding:5px 0;" onclick="alert('${bk.brand} 건을 반려합니다.')">반려</button>
      </div>
    </div>`).join('');
  document.getElementById('panelBody').innerHTML=`
    <div style="background:#fff3e0;border-radius:6px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:#7f4400;line-height:1.5;">
      ⚠️ 동일 구좌·기간에 가부킹 <strong>${bks.length}건</strong>이 경합 중입니다.<br/>1건을 확정하면 나머지는 자동 반려됩니다.
    </div>
    ${rows}`;
  document.getElementById('panelActions').innerHTML='';
  openPanel();
}
function openApplyPanel(zone,week){
  document.getElementById('panelTitle').textContent='구좌 신청';
  document.getElementById('panelSub').textContent=zone?`${zone.name} · ${week}주차`:'';
  const info=zone?zoneInfo[zone.id]:null;
  const zoneSection=info?`
    <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0f0;">
      <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:10px;letter-spacing:0.3px;">구좌 정보</div>
      <img src="${info.photo}" alt="구좌 사진" style="width:100%;height:140px;object-fit:cover;border-radius:6px;margin-bottom:12px;background:#f0f0f0;" onerror="this.style.display='none'" />
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <div style="background:#f8f9fa;border-radius:5px;padding:8px 10px;">
          <div style="font-size:10px;color:#999;margin-bottom:2px;">층/위치</div>
          <div style="font-size:12px;font-weight:600;color:#222;">${info.floor} · ${info.location}</div>
        </div>
        <div style="background:#f8f9fa;border-radius:5px;padding:8px 10px;">
          <div style="font-size:10px;color:#999;margin-bottom:2px;">규격</div>
          <div style="font-size:12px;font-weight:600;color:#222;">${info.size}</div>
        </div>
      </div>
      <div style="background:#f8f9fa;border-radius:5px;padding:8px 10px;margin-bottom:8px;">
        <div style="font-size:10px;color:#999;margin-bottom:2px;">담당 관리자</div>
        <div style="font-size:12px;font-weight:600;color:#222;">${info.manager}</div>
      </div>
      <div style="background:#f8f9fa;border-radius:5px;padding:8px 10px;">
        <div style="font-size:10px;color:#999;margin-bottom:2px;">비고</div>
        <div style="font-size:12px;color:#444;line-height:1.5;">${info.note}</div>
      </div>
    </div>`:'';
  document.getElementById('panelBody').innerHTML=`
    ${zoneSection}
    <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:12px;letter-spacing:0.3px;">신청 정보</div>
    <div class="form-group"><label class="form-label required">신청 기간</label><div style="display:flex;gap:6px;align-items:center;"><input class="form-input" type="date" value="2026-04-14" style="flex:1;"/><span style="color:#aaa;">~</span><input class="form-input" type="date" value="2026-04-28" style="flex:1;"/></div></div>
    <div class="form-group"><label class="form-label required">브랜드명</label><input class="form-input" placeholder="브랜드명 입력"/></div>
    <div class="form-group"><label class="form-label required">프로젝트명</label><input class="form-input" placeholder="프로젝트명 입력"/></div>
    <div class="form-group"><label class="form-label">커머스 유형</label><select class="form-input"><option>선택</option><option>파트너십강화</option><option>브랜드이슈</option><option>IP</option><option>기타</option></select></div>
    <div class="form-group"><label class="form-label">무신사 입점여부</label><select class="form-input"><option>선택</option><option>입점</option><option>미입점</option><option>입점예정</option></select></div>
    <div class="form-group"><label class="form-label">요청사항</label><textarea class="form-input" rows="3" placeholder="자유 입력 (최대 500자)"></textarea></div>`;
  document.getElementById('panelActions').innerHTML=`<button class="btn-primary" style="flex:1;" onclick="alert('신청이 접수되었습니다.')">신청 제출</button><button class="btn-secondary" style="flex:1;" onclick="closePanel()">취소</button>`;
  openPanel();
}
function openPanel(){document.getElementById('sidePanel').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closePanel(){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
buildCalendar();
</script>
</body>
</html>
